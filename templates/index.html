<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de Contenido IA</title>

    <!-- Fuente premium -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:'Poppins',sans-serif;
            background:linear-gradient(135deg,#0f172a,#1e293b);
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            padding:20px;
            color:white;
        }

        .contenedor{
            width:100%;
            max-width:650px;
            background:#111827;
            padding:35px;
            border-radius:24px;
            box-shadow:0 10px 40px rgba(0,0,0,0.4);
        }

        h1{
            text-align:center;
            font-size:34px;
            margin-bottom:10px;
        }

        .subtitulo{
            text-align:center;
            color:#cbd5e1;
            margin-bottom:30px;
            font-size:16px;
        }

        textarea{
            width:100%;
            height:120px;
            border:none;
            border-radius:16px;
            background:#1f2937;
            color:white;
            padding:18px;
            font-size:16px;
            outline:none;
            resize:none;
            margin-bottom:20px;
        }

        textarea::placeholder{
            color:#94a3b8;
        }

        button{
            width:100%;
            padding:18px;
            border:none;
            border-radius:16px;
            background:linear-gradient(90deg,#7c3aed,#06b6d4);
            color:white;
            font-size:18px;
            font-weight:700;
            cursor:pointer;
            transition:0.3s;
        }

        button:hover{
            transform:scale(1.02);
            opacity:0.95;
        }

        .resultado{
            margin-top:30px;
            background:#1f2937;
            padding:25px;
            border-radius:18px;
            line-height:1.8;
            color:#f8fafc;
            white-space:pre-wrap;
            font-size:15px;
        }

        .badge{
            background:#7c3aed;
            width:fit-content;
            padding:8px 14px;
            border-radius:999px;
            font-size:13px;
            margin-bottom:18px;
            font-weight:600;
        }

    </style>
</head>

<body>

    <div class="contenedor">

        <div class="badge">
            🚀 IA para negocios
        </div>

        <h1>Generador de Contenido</h1>

        <p class="subtitulo">
            Crea ideas listas para Instagram en segundos con inteligencia artificial.
        </p>

        <textarea 
            placeholder="Ejemplo: Tengo una barbería premium en Guayaquil">
        </textarea>

        <button>
            Generar contenido
        </button>

        <div class="resultado">
Aquí aparecerá el contenido generado por la IA...
        </div>

    </div>

</body>
</html>
