<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de Contenido IA</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:'Poppins',sans-serif;
            background: linear-gradient(135deg,#0f172a,#1e293b);
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            padding:20px;
            color:white;
        }

        .contenedor{
            width:100%;
            max-width:800px;
        }

        .badge{
            display:inline-block;
            background:linear-gradient(90deg,#2563eb,#06b6d4);
            padding:10px 18px;
            border-radius:999px;
            font-size:14px;
            font-weight:600;
            margin-bottom:25px;
        }

        h1{
            font-size:56px;
            line-height:1;
            margin-bottom:20px;
            font-weight:700;
        }

        .subtitulo{
            font-size:22px;
            color:#cbd5e1;
            margin-bottom:35px;
        }

        textarea{
            width:100%;
            min-height:180px;
            border:none;
            outline:none;
            resize:none;
            border-radius:24px;
            padding:25px;
            font-size:20px;
            background:rgba(255,255,255,0.08);
            color:white;
            margin-bottom:25px;
            font-family:'Poppins',sans-serif;
        }

        textarea::placeholder{
            color:#94a3b8;
        }

        button{
            width:100%;
            border:none;
            padding:22px;
            border-radius:24px;
            font-size:24px;
            font-weight:700;
            cursor:pointer;
            background:linear-gradient(90deg,#8b5cf6,#22d3ee);
            color:white;
            transition:0.3s;
            margin-bottom:30px;
        }

        button:hover{
            transform:scale(1.02);
        }

        .resultado{
            width:100%;
            background:rgba(255,255,255,0.08);
            border-radius:24px;
            padding:30px;
            color:white;
            white-space:pre-wrap;
            line-height:1.7;
            font-size:17px;
        }

        .footer{
            margin-top:20px;
            text-align:center;
            color:#94a3b8;
            font-size:14px;
        }

        @media(max-width:768px){

            h1{
                font-size:42px;
            }

            .subtitulo{
                font-size:18px;
            }

            button{
                font-size:20px;
            }
        }
    </style>
</head>
<body>

    <div class="contenedor">

        <div class="badge">
            🚀 IA para negocios
        </div>

        <h1>Generador de Contenido</h1>

        <p class="subtitulo">
            Crea ideas listas para Instagram en segundos con inteligencia artificial.
        </p>

        <form method="POST">

            <textarea 
                name="prompt"
                placeholder="Ejemplo: Tengo una barbería premium en Guayaquil"
                required
            ></textarea>

            <button type="submit">
                Generar contenido
            </button>

        </form>

        {% if response %}

        <div class="resultado">
{{ response }}
        </div>

        {% endif %}

        <div class="footer">
            Demo IA • Hecho para negocios locales
        </div>

    </div>

</body>
</html>
